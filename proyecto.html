<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proyecto — Iván Gómez</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root{
    --ink:#121316; --ink-2:#191B20; --ink-3:#1E2027;
    --bone:#F2EFE6;
    --blue:#0250BB; --blue-deep:#01285C; --blue-light:#4C8EE8;
    --mist:#9B9A8E; --line: rgba(242,239,230,0.12);
    --display:'Bebas Neue', sans-serif; --body:'Inter', sans-serif; --mono:'JetBrains Mono', monospace;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{ background:var(--ink); color:var(--bone); font-family:var(--body); -webkit-font-smoothing:antialiased; }
  a{ color:inherit; text-decoration:none; }
  .wrap{ max-width:1100px; margin:0 auto; padding:0 clamp(20px,5vw,64px); }
  @media(max-width:640px){ .wrap{ padding-left:24px; padding-right:24px; } }

  header{ border-bottom:1px solid var(--line); position:sticky; top:0; background:rgba(18,19,22,0.9); backdrop-filter:blur(10px); z-index:10; }
  .nav{ display:flex; align-items:center; justify-content:space-between; height:76px; }
  .logo{ font-family:var(--display); font-size:22px; }
  .logo span{ color:var(--blue-light); }
  .back-link{ font-family:var(--mono); font-size:13px; color:var(--mist); display:flex; align-items:center; gap:8px; transition:color .2s ease; }
  .back-link:hover{ color:var(--bone); }
  .lang-toggle{ font-family:var(--mono); font-size:12px; display:flex; border:1px solid var(--line); border-radius:2px; overflow:hidden; }
  .lang-toggle button{ background:transparent; border:none; color:var(--mist); padding:8px 12px; cursor:pointer; font-family:var(--mono); font-size:12px; }
  .lang-toggle button.active{ background:var(--blue); color:var(--bone); }

  .hero{ padding:80px 0 56px; border-bottom:1px solid var(--line); position:relative; overflow:hidden; }
  .hero::before{
    content:""; position:absolute; inset:0; z-index:0;
    background:radial-gradient(ellipse 800px 400px at 10% 0%, rgba(2,80,187,0.35), transparent 60%);
  }
  .hero-content{ position:relative; z-index:1; }
  .eyebrow{ font-family:var(--mono); font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:var(--blue-light); display:flex; align-items:center; gap:10px; margin-bottom:20px; }
  .eyebrow::before{ content:""; width:24px; height:1px; background:var(--blue-light); }
  .proj-title{ font-family:var(--display); font-size:clamp(44px,8vw,96px); text-transform:uppercase; line-height:0.95; max-width:900px; }
  .meta-row{ display:flex; gap:clamp(24px,5vw,56px); flex-wrap:wrap; margin-top:40px; padding-top:28px; border-top:1px solid var(--line); }
  .meta-item{ display:flex; flex-direction:column; gap:6px; }
  .meta-label{ font-family:var(--mono); font-size:11px; color:var(--mist); letter-spacing:0.08em; text-transform:uppercase; }
  .meta-value{ font-size:15px; color:var(--bone); font-weight:500; }

  .cover{ aspect-ratio:16/9; background:linear-gradient(135deg, var(--blue-deep), var(--ink-3)); position:relative; margin:0; border-bottom:1px solid var(--line); }
  .cover::before{ content:attr(data-ph); position:absolute; inset:0; display:flex; align-items:center; justify-content:center; text-align:center; font-family:var(--mono); font-size:12px; letter-spacing:0.1em; color:rgba(242,239,230,0.35); padding:20px; }

  .cover-slider{ display:flex; gap:2px; overflow-x:auto; scroll-snap-type:x mandatory; background:var(--line); border-bottom:1px solid var(--line); -webkit-overflow-scrolling:touch; scrollbar-width:thin; justify-content:center; }
  .cover-slider::-webkit-scrollbar{ height:6px; }
  .cover-slider::-webkit-scrollbar-thumb{ background:var(--ink-3); }
  .flyer-grid{ display:flex; flex-wrap:nowrap; gap:2px; overflow-x:auto; scroll-snap-type:x mandatory; background:var(--line); border-top:1px solid var(--line); border-bottom:1px solid var(--line); -webkit-overflow-scrolling:touch; scrollbar-width:thin; }
  .flyer-grid::-webkit-scrollbar{ height:6px; }
  .flyer-grid::-webkit-scrollbar-thumb{ background:var(--ink-3); }
  .flyer-grid-item{ flex:0 0 auto; scroll-snap-align:center; aspect-ratio:9/16; height:min(82vh, 760px); background-size:cover; background-position:center; background-color:var(--ink-2); position:relative; }
  .flyer-grid-item video{ width:100%; height:100%; object-fit:cover; display:block; }
  @media(max-width:640px){ .flyer-grid-item{ height:74vh; } }
  .cover-slide{ flex:0 0 auto; scroll-snap-align:center; aspect-ratio:9/16; height:min(82vh, 760px); background-size:cover; background-position:center; background-color:var(--ink-2); position:relative; }
  .cover-slide video{ width:100%; height:100%; object-fit:cover; display:block; }
  .cover-slide{ position:relative; }
.sound-btn{ position:absolute; bottom:16px; right:16px; width:40px; height:40px; border-radius:50%; background:rgba(11,15,20,0.7); border:1px solid var(--line); color:var(--bone); font-size:16px; cursor:pointer; z-index:2; }
  @media(max-width:640px){ .cover-slide{ height:74vh; } }

  .content{ padding:88px 0; display:grid; grid-template-columns:0.85fr 1.15fr; gap:72px; }
  .content-side{ display:flex; flex-direction:column; gap:36px; position:sticky; top:110px; align-self:start; }
  .side-block{ padding-bottom:24px; border-bottom:1px solid var(--line); }
  .side-title{ font-family:var(--mono); font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:var(--blue-light); margin-bottom:10px; }
  .side-text{ font-size:14.5px; color:var(--mist); line-height:1.6; }
  .side-cta{ display:inline-block; margin-top:6px; font-family:var(--mono); font-size:13px; border-bottom:1px solid var(--blue-light); padding-bottom:2px; }

  .content-main h2{ font-family:var(--display); font-size:clamp(26px,3vw,34px); text-transform:uppercase; margin-bottom:16px; letter-spacing:0.01em; }
  .content-main .block{ margin-bottom:56px; }
  .content-main p{ font-size:16.5px; line-height:1.8; color:var(--mist); max-width:640px; }

  .gallery{ display:grid; grid-template-columns:1fr 1fr; gap:2px; background:var(--line); border:1px solid var(--line); margin-top:20px; }
  .gallery-item{ aspect-ratio:4/3; background:linear-gradient(150deg, var(--ink-3), var(--ink-2)); position:relative; }
  .gallery-item::before{ content:attr(data-ph); position:absolute; inset:0; display:flex; align-items:center; justify-content:center; text-align:center; font-family:var(--mono); font-size:10.5px; color:rgba(242,239,230,0.3); padding:14px; }

  /* ---- Behance-style case study stack ---- */
  .case-block-label{ font-family:var(--mono); font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:var(--blue-light); margin:34px 0 10px; }
  .case-block-label:first-child{ margin-top:0; }
  .case-full{ aspect-ratio:21/9; background:linear-gradient(150deg, var(--ink-3), var(--ink-2)); position:relative; border:1px solid var(--line); }
  .case-full::before{ content:attr(data-ph); position:absolute; inset:0; display:flex; align-items:center; justify-content:center; text-align:center; font-family:var(--mono); font-size:10.5px; color:rgba(242,239,230,0.3); padding:14px; }

  .case-duo, .case-trio, .case-stack{ display:grid; gap:2px; background:var(--line); border:1px solid var(--line); }
  .case-duo{ grid-template-columns:1fr 1fr; }
  .case-trio{ grid-template-columns:repeat(3,1fr); }
  .case-stack{ grid-template-columns:1fr; }
  
  .case-item{ aspect-ratio:1/1; background:linear-gradient(150deg, var(--ink-3), var(--ink-2)); position:relative; }
  .case-item::before{ content:attr(data-ph); position:absolute; inset:0; display:flex; align-items:center; justify-content:center; text-align:center; font-family:var(--mono); font-size:10px; color:rgba(242,239,230,0.3); padding:12px; }
  .case-palette{ display:flex; flex-wrap:wrap; gap:18px; background:var(--ink-2); border:1px solid var(--line); padding:28px; }
  .case-swatch{ display:flex; flex-direction:column; gap:10px; width:92px; }
  .case-swatch-color{ width:100%; aspect-ratio:1/1; border-radius:2px; border:1px solid var(--line); }
  .case-swatch-label{ font-family:var(--mono); font-size:9.5px; color:var(--mist); letter-spacing:0.03em; }
  .case-type{ background:var(--ink-2); border:1px solid var(--line); padding:44px 32px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; min-height:160px; gap:12px; }
.case-type-text{ font-family:var(--display); font-size:clamp(30px,5vw,56px); text-transform:uppercase; letter-spacing:0.02em; color:var(--bone); opacity:0.9; }
.case-type-name{ font-family:var(--mono); font-size:12px; letter-spacing:0.08em; text-transform:uppercase; color:var(--mist); }
  .team-title{ background:linear-gradient(180deg, var(--ink-2), var(--ink-3)); border-top:1px solid var(--line); border-bottom:1px solid var(--line); padding:26px 20px; text-align:center; font-family:'Brush Script MT', cursive; font-style:italic; font-size:clamp(26px,4vw,42px); letter-spacing:0.02em; color:var(--bone); text-transform:uppercase; }
  .team-duo{ display:grid; grid-template-columns:1fr 1fr; gap:2px; background:var(--line); border-bottom:1px solid var(--line); }
  .team-item{ aspect-ratio:3/4; background-size:cover; background-position:center; background-color:var(--ink-2); cursor:pointer; position:relative; overflow:hidden; }
  .zoom-hint{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; background:rgba(11,15,20,0); opacity:0; transition:opacity 0.2s, background 0.2s; }
  .team-item:hover .zoom-hint{ opacity:1; background:rgba(11,15,20,0.55); }
  .zoom-hint svg{ width:28px; height:28px; stroke:var(--bone); }
  .zoom-hint span{ font-family:var(--mono); font-size:10.5px; letter-spacing:0.06em; color:var(--bone); text-transform:uppercase; }
  .lightbox{ display:none; position:fixed; inset:0; z-index:999; background:rgba(5,7,10,0.92); align-items:center; justify-content:center; padding:32px; cursor:zoom-out; }
  .lightbox.active{ display:flex; }
  .lightbox img{ max-width:100%; max-height:100%; width:auto; height:auto; object-fit:contain; box-shadow:0 20px 60px rgba(0,0,0,0.5); }
  @media(max-width:640px){ .zoom-hint{ opacity:1; background:linear-gradient(180deg, transparent 60%, rgba(11,15,20,0.65)); align-items:flex-end; padding-bottom:14px; } .zoom-hint svg{ width:20px; height:20px; } }
  @media(max-width:640px){ .team-duo{ grid-template-columns:1fr; } }


  @media(max-width:640px){ .case-duo, .case-trio{ grid-template-columns:1fr; } }

  @media(max-width:860px){
    .content{ grid-template-columns:1fr; }
    .content-side{ position:static; }
  }

  .nav-projects{ border-top:1px solid var(--line); background:var(--ink-2); }
  .nav-projects .wrap{ display:grid; grid-template-columns:1fr 1fr; }
  .nav-proj-link{ padding:44px 0; display:flex; flex-direction:column; gap:10px; }
  .nav-proj-link:first-child{ border-right:1px solid var(--line); padding-right:32px; }
  .nav-proj-link:last-child{ padding-left:32px; text-align:right; align-items:flex-end; }
  .nav-proj-label{ font-family:var(--mono); font-size:11px; color:var(--mist); letter-spacing:0.08em; text-transform:uppercase; }
  .nav-proj-name{ font-family:var(--display); font-size:26px; text-transform:uppercase; }
  @media(max-width:640px){ .nav-projects .wrap{ grid-template-columns:1fr; } .nav-proj-link:first-child{ border-right:none; border-bottom:1px solid var(--line); padding-right:0; } .nav-proj-link:last-child{ padding-left:0; text-align:left; align-items:flex-start; } }

  footer{ padding:28px 0; font-family:var(--mono); font-size:11px; color:rgba(242,239,230,0.4); display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px; }

  /* Móvil: márgenes y flyers verticales */
  @media(max-width:640px){
    .wrap { padding-left: 20px !important; padding-right: 20px !important; }
    .content { padding-left: 20px !important; padding-right: 20px !important; }

    /* cover-slider: los 4 primeros flyers (2 imagen + 2 video) en vertical */
    .cover-slider {
      flex-direction: column !important;
      overflow-x: hidden !important;
      overflow-y: visible !important;
      scroll-snap-type: none !important;
      gap: 20px !important;
      padding: 20px !important;
      background: transparent !important;
      border: none !important;
      justify-content: flex-start !important;
    }
    .cover-slide {
      width: 100% !important;
      height: auto !important;
      min-height: unset !important;
      aspect-ratio: 9/16 !important;
      scroll-snap-align: unset !important;
      border-radius: 6px !important;
      flex: none !important;
      background-size: cover !important;
      background-position: center !important;
    }
    .cover-slide video {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
      display: block !important;
      border-radius: 6px !important;
    }

    /* flyer-grid: los flyers de abajo también en vertical */
    .flyer-grid {
      flex-direction: column !important;
      overflow-x: hidden !important;
      overflow-y: visible !important;
      scroll-snap-type: none !important;
      gap: 20px !important;
      padding: 20px !important;
      background: transparent !important;
      border: none !important;
    }
    .flyer-grid-item {
      width: 100% !important;
      height: auto !important;
      min-height: unset !important;
      aspect-ratio: 9/16 !important;
      scroll-snap-align: unset !important;
      border-radius: 6px !important;
      flex: none !important;
    }
    .flyer-grid-item video {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
      display: block !important;
      border-radius: 6px !important;
    }
  }

  .not-found{ padding:160px 0; text-align:center; }
  .not-found h1{ font-family:var(--display); font-size:48px; text-transform:uppercase; margin-bottom:16px; }
  .not-found p{ color:var(--mist); margin-bottom:24px; }
  .not-found a{ font-family:var(--mono); font-size:13px; border-bottom:1px solid var(--blue-light); padding-bottom:3px; }
</style>
</head>
<body>

<header>
  <div class="wrap nav">
    <a href="index.html" class="back-link">← <span id="backLabel">Volver al portfolio</span></a>
    <div class="logo">IVÁN GÓMEZ</div>
    <div class="lang-toggle">
      <button id="btnES" class="active">ES</button>
      <button id="btnEN">EN</button>

<div id="appRoot"></div>

</div>

<footer>
  <div class="wrap" style="display:flex; justify-content:space-between; width:100%; flex-wrap:wrap; gap:10px;">
    <span>© 2026 Iván Gómez</span>
    <a href="https://www.behance.net/iveffects" target="_blank" rel="noopener">Behance ↗</a>
  </div>
</footer>

<script>
/* ============================================================
   FICHAS DE PROYECTO
   ⚠️ PLANTILLA — sustituye todo el contenido de cada proyecto:
   name, category, client, year, tools, cover (imagen), behance,
   brief / proceso / resultado (en es y en) y la galería.
   El "slug" (id) debe coincidir con el usado en index.html
   ============================================================ */
const PROYECTOS_DETAIL = {
  "proyecto-01": { name:"Moon Café y Copas", cat:"branding", client:"Moon Café y Copas", year:"2025", tools:"Photoshop, Illustrator", behance:"https://www.behance.net/gallery/202302745/Moon-Branding", prev:"proyecto-06", next:"proyecto-02", mockupsLabel:{es:"Flyers", en:"Flyers"}, hideBlocks:["type", "applications"],
    cover:"img/moon.png", imgOverview:"img/moon_02.jpg", imgConcept1:"img/bar1.jpg", imgConcept2:"img/bar2.webp", imgApps:null, palette:["#000000", "#ffffff"], imgType:null,
    brief:{es:"Moon Café y Copas es un local de ocio nocturno que necesitaba una identidad visual capaz de transmitir su propuesta: noches inolvidables, diversión y una experiencia exclusiva. El objetivo era crear una marca sofisticada y con carácter, que funcionara tanto en el propio local como en redes sociales y soportes promocionales.",en:"Moon Café y Copas is a nightlife venue that needed a visual identity able to convey its promise: unforgettable nights, fun and an exclusive experience. The goal was to build a sophisticated brand with real character, working both in the physical venue and across social media and promotional materials."},
    process:{es:"Se desarrolló un logotipo con un símbolo de luna creciente integrado en la tipografía, en dos versiones (positivo y negativo) para adaptarse a distintos fondos. Se definió una paleta minimalista en blanco y negro que refuerza la elegancia nocturna de la marca, y se trabajó el naming secundario 'Café y Copas' como complemento del isotipo principal.",en:"A logotype was developed featuring a crescent moon symbol integrated into the typography, in two versions (positive and negative) to adapt to different backgrounds. A minimalist black-and-white palette was defined to reinforce the brand's nocturnal elegance, and the secondary tagline 'Café y Copas' was worked in as a complement to the main mark."},
    result:{es:"La identidad se aplicó a uniformes del personal (polos), publicaciones para redes sociales (apertura, sesiones de DJ, happy hour), proyecciones ambientales en el propio local y soportes físicos como pulseras de eventos. El resultado es una marca coherente y reconocible en cada punto de contacto con el cliente.",en:"The identity was applied to staff uniforms (polo shirts), social media content (opening night, DJ sessions, happy hour), on-site environmental projections, and physical materials such as event wristbands. The result is a coherent, recognizable brand across every customer touchpoint."},
    imgMock1:"img/1.png", imgMock2:"img/3.png", imgMock3:"img/2.png" },


  "proyecto-02": { name:"Naturvellum", cat:"branding", client:"Naturvellum", year:"2025", tools:"Photoshop, Illustrator", behance:"https://www.behance.net/gallery/202336427/Naturvellum-Branding", prev:"proyecto-01", next:"proyecto-03",
    cover:"img/naturvellum.png", imgOverview:"img/natur/pre.png", imgConcept1:"img/natur/5.jpg", imgConcept2:"img/natur/4.1.jpg", imgApps:"img/rrss_3.png", palette:["#5db257", "#ffffff"], imgType:null, typeface:{name:"Caviar Dreams", sample:"A B C D e f g h i j k l m n o p q r s t u v w y z"},
    brief:{es:"Naturvellum es una marca especializada en envases de pañuelos comprometida con el medio ambiente. Necesitaba una identidad visual que transmitiera su propuesta de valor: sustituir el plástico por cartón, reduciendo el impacto ambiental y promoviendo la sostenibilidad a través de la regla de las tres RRR (reutilizar, reciclar y reducir).",en:"Naturvellum is a tissue packaging brand committed to the environment. It needed a visual identity that conveyed its value proposition: replacing plastic with cardboard, reducing environmental impact and promoting sustainability through the three Rs rule (reuse, reduce, recycle)."},
    process:{es:"Se diseñó un isotipo formado por tres hojas, simbolizando directamente la regla de las tres RRR en la que se basa el producto. Se eligió una paleta verde y blanca que refuerza el carácter natural y ecológico de la marca, junto con la tipografía Caviar Dreams, de trazo suave y orgánico. El sistema se completó con la aplicación en papelería corporativa (tarjetas, sobres, carta) y packaging (bolsa y caja de cartón).",en:"An isotype made up of three leaves was designed, directly symbolizing the three Rs rule the product is based on. A green and white palette was chosen to reinforce the brand's natural, eco-friendly character, paired with Caviar Dreams typeface for its soft, organic strokes. The system was completed with applications on corporate stationery (business cards, envelopes, letterhead) and packaging (bag and cardboard box)."},
    result:{es:"La identidad se aplicó de forma coherente en papelería, packaging y soportes de marca, transmitiendo en cada pieza el compromiso ecológico de Naturvellum. El resultado es un sistema visual limpio, reconocible y alineado con los valores de sostenibilidad de la marca.",en:"The identity was consistently applied across stationery, packaging and brand materials, conveying Naturvellum's environmental commitment in every piece. The result is a clean, recognizable visual system aligned with the brand's sustainability values."},
    imgMock1:"img/natur/3.jpg", imgMock2:"img/natur/4.jpg", imgMock3:"img/natur/bolsa.jpg" },


  "proyecto-03": { name:"Peña Sevillista Ventippo", cat:"social", client:"Peña Sevillista Ventippo", year:"2024", tools:"Photoshop, Premiere", behance:"https://www.behance.net/gallery/214173515/RRSS", prev:"proyecto-02", next:"proyecto-04",  hideBlocks:["type", "palette", "concept", "cover"], mockupsLabel:{es:"Flyers", en:"Flyers"},
    cover:null, imgOverview:"img/peña/4.png", imgConcept1:null, imgConcept2:null, imgApps:"img/peña/5.png", palette:[], imgType:null,
    brief:{es:"La Peña Sevillista Ventippo, situada en Casariche (Sevilla), necesitaba reforzar su identidad digital y aumentar el alcance de sus publicaciones en redes sociales. El objetivo era crear contenido gráfico alineado con los valores y la pasión de la afición, que funcionara tanto para eventos puntuales (Champions, derbis, sorteos) como para la comunicación habitual de la peña.",en:"Peña Sevillista Ventippo, based in Casariche (Seville), needed to strengthen its digital identity and increase the reach of its social media posts. The goal was to create graphic content aligned with the fans' values and passion, working both for one-off events (Champions League, derbies, giveaways) and for the club's everyday communication."},
    process:{es:"Se gestionaron las redes sociales de la peña de forma integral: diseño de piezas originales para partidos, banners de eventos y anuncios, y redacción de contenido adaptado a cada ocasión. Se trabajó con una identidad visual roja y dorada, coherente con los colores del Sevilla FC, adaptándola a distintos formatos: anuncios de partidos de Champions y Liga, sorteos, convivencias de socios, cenas anuales y promociones de viajes a partidos fuera de casa.",en:"The fan club's social media was managed end-to-end: designing original artwork for matches, event banners and announcements, and writing content tailored to each occasion. A red-and-gold visual identity was used, consistent with Sevilla FC's colors, adapted across formats: Champions League and league match announcements, giveaways, member gatherings, annual dinners and away-match trip promotions."},
    result:{es:"La estrategia de contenido incrementó el alcance y la interacción de la comunidad, consolidando una identidad visual reconocible en cada publicación. Las piezas diseñadas cubrieron todo el calendario de la peña durante la temporada: desde partidos de Champions hasta eventos sociales y promociones especiales.",en:"The content strategy increased the community's reach and engagement, establishing a recognizable visual identity across every post. The designed pieces covered the fan club's entire calendar throughout the season: from Champions League matches to social events and special promotions."},

function getParams(){
  const p = new URLSearchParams(window.location.search);
  return { id: p.get('id'), lang: (p.get('lang')==='en') ? 'en' : 'es' };
}
function toggleSound(videoId, btn){
  const video = document.getElementById(videoId);
  video.muted = !video.muted;
  btn.textContent = video.muted ? '🔇' : '🔊';
}
function openLightbox(src){
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('active');
}
function closeLightbox(){
  document.getElementById('lightbox').classList.remove('active');
  document.getElementById('lightboxImg').src = '';
}
// Si hay ruta de imagen, la pinta de fondo; si no, deja el placeholder de siempre.
function mediaAttrs(src, ph){
  if(src){
    return `data-ph="" style="background-image:url('${src}');background-size:cover;background-position:center;"`;
  }
  return `data-ph="${ph}"`;
}

// Pinta los swatches con los hex reales si hay paleta; si no, deja el placeholder de siempre.
function paletteHTML(palette, swatchLabel){
  if(palette && palette.length){
    return palette.map(hex => `
      <div class="case-swatch"><div class="case-swatch-color" style="background:${hex};"></div><div class="case-swatch-label">${swatchLabel} ${hex.toUpperCase()}</div></div>
    `).join('');
  }
  const fallback = ['var(--blue)','var(--blue-deep)','var(--blue-light)','var(--ink-3)','var(--bone)'];
  return fallback.map(c => `
    <div class="case-swatch"><div class="case-swatch-color" style="background:${c};"></div><div class="case-swatch-label">${swatchLabel} #______</div></div>
  `).join('');
}
